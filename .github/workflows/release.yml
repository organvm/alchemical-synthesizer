name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the artifacts (e.g. v1.0.1)"
        required: true
        default: "v0.0.0-manual"

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so build_release.sh can describe tags

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Smoke test before packaging
        run: bash tools/smoke.sh --strict

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        run: bash tools/build_release.sh "${{ steps.ver.outputs.version }}"

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: alchemical-synthesizer-${{ steps.ver.outputs.version }}
          path: dist/

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
